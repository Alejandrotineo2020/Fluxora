<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fluxora Panel Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

  <div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white vh-100 p-3 position-fixed" style="width:240px;">
      <h4 class="text-center mb-4 logo">Fluxora Admin</h4>
      <hr class="bg-light">
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link text-white active" href="#"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#"><i class="fas fa-box me-2"></i> Productos</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#"><i class="fas fa-shopping-cart me-2"></i> Pedidos</a></li>
      </ul>
    </div>

    <!-- Contenido principal -->
    <div class="flex-grow-1" style="margin-left:240px;">
      <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
          <div class="collapse navbar-collapse" id="navbarAdmin">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html"><i class="fas fa-arrow-left me-1"></i> Volver a la tienda</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <main class="p-4">
        <h2 class="mb-4 fw-bold">Panel de Administración</h2>

        <div class="row g-4 mb-5">
          <div class="col-md-4">
            <div class="card text-center shadow-sm border-0">
              <div class="card-body">
                <h5 class="text-muted">Productos totales</h5>
                <h3 id="statProducts">0</h3>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center shadow-sm border-0">
              <div class="card-body">
                <h5 class="text-muted">Ventas totales</h5>
                <h3 id="statSales">$0</h3>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center shadow-sm border-0">
              <div class="card-body">
                <h5 class="text-muted">Pedidos registrados</h5>
                <h3 id="statOrders">0</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Productos</h5>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addProductModal">
              <i class="fas fa-plus me-1"></i> Agregar producto
            </button>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Imagen</th>
                    <th>Título</th>
                    <th>Precio</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="adminProductsTable"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-header bg-white">
            <h5 class="mb-0">Historial de Pedidos</h5>
          </div>
          <div class="card-body" id="ordersHistory"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal agregar producto -->
  <div class="modal fade" id="addProductModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nuevo Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Título *</label>
            <input type="text" class="form-control" id="newTitle" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Precio (USD) *</label>
            <input type="number" step="0.01" min="0.01" class="form-control" id="newPrice" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Categoría</label>
            <select class="form-select" id="newCategory">
              <option value="electronics">Electrónicos</option>
              <option value="jewelery">Joyería</option>
              <option value="men's clothing">Ropa de hombre</option>
              <option value="women's clothing">Ropa de mujer</option>
              <option value="other">Otros</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" id="newDescription" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">URL de imagen (opcional)</label>
            <input type="url" class="form-control" id="newImage" placeholder="https://ejemplo.com/imagen.jpg">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="saveNewProduct()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
